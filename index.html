<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' https:; media-src 'self' blob:; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>RAT</title>
    <meta
      name="description"
      content="A minimal voice surface for a private local RAT planning engine."
    />
    <link rel="stylesheet" href="./styles.css?v=rat-voice-5" />
  </head>
  <body>
    <main class="app" id="app" data-mode="locked">
      <section class="unlock" id="unlockView" aria-labelledby="unlockTitle">
        <div class="identity" aria-hidden="true">
          <span class="identity-mark"></span>
          <span>RAT</span>
        </div>

        <form class="unlock-form" id="gatewayLoginForm" autocomplete="off">
          <h1 id="unlockTitle">Wake RAT.</h1>
          <label>
            <span>Endpoint</span>
            <input
              id="gatewayUrl"
              type="url"
              inputmode="url"
              required
              autocomplete="off"
              spellcheck="false"
              placeholder="https://your-machine.example"
            />
          </label>
          <label>
            <span>Password</span>
            <input
              id="gatewayPassword"
              type="password"
              required
              autocomplete="off"
            />
          </label>
          <button id="gatewayLoginButton" type="submit">Begin</button>
          <p class="unlock-status" id="gatewayStatus" role="status">
            Nothing leaves your chosen gateway.
          </p>
        </form>
      </section>

      <section class="conversation" id="conversationView" aria-labelledby="conversationTitle" hidden>
        <h1 class="visually-hidden" id="conversationTitle">Conversation with RAT</h1>
        <button
          class="waveform-surface"
          id="waveformSurface"
          type="button"
          aria-label="Hold to speak"
          aria-pressed="false"
        >
          <canvas id="waveformCanvas" aria-hidden="true"></canvas>
          <span class="hold-label" id="holdLabel" aria-hidden="true">Hold to speak</span>
          <span class="visually-hidden" id="waveformAction">Hold to speak</span>
        </button>
        <p class="conversation-status" id="conversationStatus" aria-live="polite">ready</p>
        <p class="conversation-message" id="conversationMessage" role="status" aria-live="polite"></p>

        <form class="text-composer" id="textComposer" hidden>
          <label class="visually-hidden" for="textInput">Type to RAT</label>
          <input id="textInput" autocomplete="off" placeholder="Say it in text…" />
        </form>
      </section>
    </main>

    <script src="./app.js?v=rat-voice-5" defer></script>
  </body>
</html>
